services:
  conversation-lab:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/dev.db}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_COMPATIBLE: ${OPENAI_COMPATIBLE:-false}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    volumes:
      - conversation-lab-data:/app/data

volumes:
  conversation-lab-data: